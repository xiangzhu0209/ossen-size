<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歐昇 - 尺寸換算器</title>
    <style>
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background-color: #f0f2f5; 
            padding: 20px; 
            text-align: center; 
            margin: 0;
        }
        .container { 
            background: white; 
            padding: 30px 20px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            max-width: 400px; 
            margin: 20px auto; 
        }
        h2 { color: #333; margin-top: 0; letter-spacing: 1px; }
        .hint { color: #888; font-size: 14px; margin-bottom: 25px; }
        
        .input-group { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            margin-bottom: 20px;
        }
        
        input[type="number"] { 
            width: 40%; 
            padding: 15px 10px; 
            font-size: 22px; 
            text-align: center; 
            border: 2px solid #ddd; 
            border-radius: 10px; 
            background-color: #fafafa;
            transition: all 0.3s;
        }
        input[type="number"]:focus { 
            border-color: #007bff; 
            background-color: #fff; 
            outline: none; 
            box-shadow: 0 0 8px rgba(0, 123, 255, 0.2);
        }
        
        .multiply-sign { font-size: 24px; color: #999; font-weight: bold; }
        
        /* 一鍵清除按鈕樣式 */
        #clear-btn {
            background-color: #f8f9fa;
            color: #495057;
            border: 1px solid #ced4da;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        #clear-btn:active {
            background-color: #e2e6ea;
            transform: scale(0.98);
        }

        #result { 
            margin-top: 20px; 
            font-size: 28px; 
            font-weight: bold; 
            padding: 25px 20px; 
            background: #e8f4fd; 
            border-radius: 10px; 
            color: #0056b3; 
            line-height: 1.6; 
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .empty-text { color: #aaa; font-size: 18px; font-weight: normal; }
    </style>
</head>
<body>

    <div class="container">
        <h2>歐昇 尺寸換算器</h2>
        <div class="hint">輸入台尺自動轉公分，輸入框支援小數點</div>
        
        <div class="input-group">
            <input type="number" id="length" placeholder="長" inputmode="decimal">
            <span class="multiply-sign">×</span>
            <input type="number" id="width" placeholder="寬" inputmode="decimal">
        </div>

        <!-- 一鍵清除按鈕 -->
        <button id="clear-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
                <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
            </svg>
            清除重新輸入
        </button>

        <div id="result">
            <span class="empty-text">換算結果將顯示於此</span>
        </div>
    </div>

    <script>
        const lengthInput = document.getElementById('length');
        const widthInput = document.getElementById('width');
        const resultDiv = document.getElementById('result');
        const clearBtn = document.getElementById('clear-btn');

        function calculate() {
            const l = parseFloat(lengthInput.value);
            const w = parseFloat(widthInput.value);
            let resultHTML = '';

            if (!isNaN(l)) {
                resultHTML += `長: ${(l * 30.3).toFixed(1)} cm`;
            }
            if (!isNaN(l) && !isNaN(w)) {
                resultHTML += `<br>`;
            }
            if (!isNaN(w)) {
                resultHTML += `寬: ${(w * 30.3).toFixed(1)} cm`;
            }

            if (resultHTML === '') {
                resultDiv.innerHTML = '<span class="empty-text">換算結果將顯示於此</span>';
                resultDiv.style.background = '#e9ecef';
            } else {
                resultDiv.innerHTML = resultHTML;
                resultDiv.style.background = '#e8f4fd';
            }
        }

        // 監聽輸入即時計算
        lengthInput.addEventListener('input', calculate);
        widthInput.addEventListener('input', calculate);

        // 監聽清除按鈕
        clearBtn.addEventListener('click', () => {
            lengthInput.value = '';
            widthInput.value = '';
            calculate(); // 觸發清空畫面
            lengthInput.focus(); // 清除後自動將游標跳回「長」的輸入框
        });
    </script>
</body>
</html>
