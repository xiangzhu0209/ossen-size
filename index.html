<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歐昇 - 精準尺寸掃描器</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { text-align: center; font-family: sans-serif; padding: 10px; background: #f4f4f4; margin: 0; }
        h3 { margin-top: 10px; color: #333; }
        .container { position: relative; display: inline-block; width: 100%; max-width: 500px; }
        #video { width: 100%; border-radius: 10px; display: block; }
        
        .mask-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); border-radius: 10px; pointer-events: none;
        }
        .frame { 
            position: absolute; 
            top: 20%; left: 20%; width: 60%; height: 60%; 
            border: 3px solid #00ff00; border-radius: 8px; 
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5); 
            background: transparent; 
        }

        /* 新增：手動掃描按鈕 */
        #scan-btn {
            display: block; width: 80%; max-width: 300px; margin: 20px auto; 
            padding: 15px; font-size: 20px; font-weight: bold; 
            background-color: #007bff; color: white; border: none; 
            border-radius: 50px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        #scan-btn:active { background-color: #0056b3; transform: scale(0.98); }
        #scan-btn:disabled { background-color: #ccc; cursor: not-allowed; }

        #result { font-size: 18px; font-weight: bold; margin: 15px 0; padding: 20px; background: white; border-radius: 8px; line-height: 1.6; }
        .cm-result { color: #d32f2f; font-size: 28px; font-weight: 900; }
        .taiwan-val { font-size: 20px; color: #333; }
        
        /* 新增：除錯文字，讓你知道 AI 到底看到了什麼 */
        #debug-text { font-size: 12px; color: #888; margin-top: 10px; word-break: break-all; padding: 0 20px; }
    </style>
</head>
<body>

    <h3>歐昇：台尺轉公分 (手動精準版)</h3>
    <p style="font-size:14px;color:#666;margin:0 0 10px 0;">請等待相機對焦清晰後，再按下掃描</p>
    
    <div class="container">
        <video id="video" autoplay playsinline></video>
        <div class="mask-overlay"></div>
        <div class="frame"></div>
    </div>

    <button id="scan-btn" disabled>相機準備中...</button>
    <div id="result">等待操作...</div>
    <div id="debug-text">AI 原始判讀結果會顯示在這裡</div>

    <script>
        const video = document.getElementById('video');
        const frame = document.querySelector('.frame');
        const resultDiv = document.getElementById('result');
        const scanBtn = document.getElementById('scan-btn');
        const debugText = document.getElementById('debug-text');

        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } 
                });
                video.srcObject = stream;
                video.addEventListener('loadeddata', () => {
                    scanBtn.innerText = "📸 點擊掃描尺寸";
                    scanBtn.disabled = false;
                });
            } catch (error) {
                resultDiv.innerHTML = "<span style='color:red;'>無法存取相機，請確認權限。</span>";
            }
        }

        scanBtn.addEventListener('click', async () => {
            scanBtn.disabled = true;
            scanBtn.innerText = "⏳ 辨識中...";
            resultDiv.innerHTML = "正在分析影像...";
            debugText.innerText = "";

            const canvas = document.createElement('canvas');
            const scaleX = video.videoWidth / video.offsetWidth;
            const scaleY = video.videoHeight / video.offsetHeight;

            const ROI_Width = frame.offsetWidth * scaleX;
            const ROI_Height = frame.offsetHeight * scaleY;
            const sx = frame.offsetLeft * scaleX;
            const sy = frame.offsetTop * scaleY;

            canvas.width = 600; // 提高解析度讓數字更清楚
            canvas.height = Math.round(canvas.width * (frame.offsetHeight / frame.offsetWidth));

            const ctx = canvas.getContext('2d');
            
            // 加入影像濾鏡：增加對比度、轉灰階，大幅降低塑膠反光干擾
            ctx.filter = 'grayscale(100%) contrast(250%)';
            ctx.drawImage(video, sx, sy, ROI_Width, ROI_Height, 0, 0, canvas.width, canvas.height);

            try {
                const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
                debugText.innerText = `AI 看到的原始文字：[ ${text.replace(/\n/g, ' ')} ]`;
                
                // 嚴格抓取帶有小數點的數字，或者1到2位數的整數
                const numberRegex = /\b\d{1,2}(\.\d{1,2})?\b/g;
                let matches = text.match(numberRegex);

                if (matches) {
                    // 過濾掉不合理的尺寸 (例如小於 1 尺或大於 30 尺的極端值)
                    matches = matches.map(parseFloat).filter(val => val >= 1.0 && val <= 30.0);
                }

                if (matches && matches.length >= 2) {
                    const lVal = matches[0];
                    const wVal = matches[1];

                    const lCm = (lVal * 30.3).toFixed(1);
                    const wCm = (wVal * 30.3).toFixed(1);

                    resultDiv.innerHTML = `
                        <span class="taiwan-val">识别台尺: ${lVal} × ${wVal}</span><br>
                        <span class="cm-result">${lCm} cm × ${wCm} cm</span>
                    `;
                } else {
                    resultDiv.innerHTML = "<span style='color:red;'>無法確認尺寸</span><br><span style='font-size:14px;color:#666;'>請避開反光，確保數字清晰且在框內</span>";
                }
            } catch (err) {
                console.error(err);
                resultDiv.innerHTML = "辨識發生錯誤，請重試。";
            }

            scanBtn.innerText = "📸 點擊掃描尺寸";
            scanBtn.disabled = false;
        });

        setupCamera();
    </script>
</body>
</html>
